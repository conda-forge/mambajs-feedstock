context:
  name: mambajs
  version: "0.21.6"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/emscripten-forge/mambajs/archive/v${{ version }}.tar.gz
  sha256: 3e87751eb1a4932825c3cbf8654c87998c5855e3f25b38237719f82373a49cfd

build:
  number: 0

requirements:
  build:
    - yarn =3
    - nodejs
  host:
    - yarn =3
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - mambajs --help
      - mambajs --version

about:
  homepage: https://github.com/emscripten-forge/mambajs
  repository: https://github.com/emscripten-forge/mambajs
  summary: 'Mambajs CLI for generating lock files'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martinRenou
