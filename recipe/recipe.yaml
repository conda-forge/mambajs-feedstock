context:
  name: mambajs
  version: "0.21.4"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/emscripten-forge/mambajs/archive/v${{ version }}.tar.gz
  sha256: fefeab29d1e6b5419a5a8946465c24d76e06c335491d40f21d3ee9c28f638309

build:
  number: 0

requirements:
  build:
    - yarn =4
    - nodejs
  host:
    - yarn =4
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - mambajs --help
      - mambajs --version

about:
  homepage: https://github.com/emscripten-forge/mambajs
  repository: https://github.com/emscripten-forge/mambajs
  summary: 'Mambajs CLI for generating lock files'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martinRenou
